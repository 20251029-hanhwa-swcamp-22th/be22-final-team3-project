services:

  # ── Kafka KRaft (no Zookeeper needed) ──
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "docker-compose-kraft-cluster-id"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  # ── Backend: Admin (port 8080) ──
  backend-admin:
    build: ./team3-backend-admin
    ports:
      - "8080:8080"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NLP_GOOGLE_CREDENTIALS_LOCATION: file:/run/secrets/gcp_key_json
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 30000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000

    secrets:
      - gcp_key_json
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend: HR (port 8081) ──
  backend-hr:
    build: ./team3-backend-hr
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FEIGN_ADMIN_URL: http://backend-admin:8080
      FEIGN_SCM_URL: http://backend-scm:8082
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 30000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
    depends_on:
      kafka:
        condition: service_healthy
      backend-admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8081'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend: SCM (port 8082) ──
  backend-scm:
    build: ./team3-backend-scm
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ADMIN_URL: http://backend-admin:8080
      HR_URL: http://backend-hr:8081
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 30000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8082'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend: KMS (port 8083) ──
  backend-kms:
    build: ./team3-backend-kms
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 30000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8083'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Backend: Batch (port 8084) ──
  backend-batch:
    build: ./team3-backend-batch
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NLP_GOOGLE_CREDENTIALS_LOCATION: file:/run/secrets/gcp_key_json
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 2
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: 10000
      SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: 30000
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
    secrets:
      - gcp_key_json
    depends_on:
      kafka:
        condition: service_healthy
      backend-admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8084'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Frontend (port 80) ──
  frontend:
    build: ./team3-frontend
    ports:
      - "80:80"
    depends_on:
      backend-admin:
        condition: service_healthy
      backend-hr:
        condition: service_healthy
      backend-scm:
        condition: service_healthy
      backend-kms:
        condition: service_healthy

secrets:
  gcp_key_json:
    file: ./secrets/gcp-key.json
